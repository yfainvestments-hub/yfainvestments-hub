name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-art
  cancel-in-progress: true

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install generator dependencies
        run: pip install -r scripts/requirements.txt
      - name: Refresh contribution data and artwork
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py
      - name: Commit refreshed artwork
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
