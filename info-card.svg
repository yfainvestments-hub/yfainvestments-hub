<svg xmlns="http://www.w3.org/2000/svg" width="510" height="300" viewBox="0 0 510 300" role="img" aria-labelledby="title desc">
<title id="title">YFA Investments terminal profile card</title>
<desc id="desc">Profile summary covering role, focus, technology stack, current project, and learning.</desc>
<style>
  text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .host { fill:#f4eaff; font-size:16px; font-weight:700; }
  .prompt { fill:#65d6a6; font-size:12px; }
  .key { fill:#bd83d6; font-size:12px; font-weight:700; }
  .sep { fill:#6c5878; font-size:12px; }
  .value { fill:#e7dceb; font-size:12px; }
  .line { opacity:1; }
</style>
<rect width="508" height="298" x="1" y="1" rx="16" fill="#100b16" stroke="#3d2a49" />
<circle cx="22" cy="22" r="5" fill="#ff6b81"/><circle cx="39" cy="22" r="5" fill="#f6c85f"/><circle cx="56" cy="22" r="5" fill="#65d6a6"/>
<text class="host" x="34" y="62">yfa@github</text><text class="prompt" x="150" y="62">~ $ whoami --verbose</text>
<line x1="34" y1="76" x2="476" y2="76" stroke="#3d2a49" />
<g class="line" transform="translate(34 102)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.35s" fill="freeze" /><text class="key"> identity</text><text class="sep" x="100">:</text><text class="value" x="118">YFA Investments</text></g><g class="line" transform="translate(34 127)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.55s" fill="freeze" /><text class="key">     role</text><text class="sep" x="100">:</text><text class="value" x="118">builder + operator</text></g><g class="line" transform="translate(34 152)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.75s" fill="freeze" /><text class="key">    focus</text><text class="sep" x="100">:</text><text class="value" x="118">AI systems + automation</text></g><g class="line" transform="translate(34 177)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.95s" fill="freeze" /><text class="key">    stack</text><text class="sep" x="100">:</text><text class="value" x="118">Python · JavaScript · React</text></g><g class="line" transform="translate(34 202)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.15s" fill="freeze" /><text class="key"> shipping</text><text class="sep" x="100">:</text><text class="value" x="118">OmniSolve Pipeline</text></g><g class="line" transform="translate(34 227)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.35s" fill="freeze" /><text class="key"> learning</text><text class="sep" x="100">:</text><text class="value" x="118">30 Days of Python</text></g><g class="line" transform="translate(34 252)"><animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.55s" fill="freeze" /><text class="key">   signal</text><text class="sep" x="100">:</text><text class="value" x="118">practical tools &gt; hype</text></g>
<text x="34" y="282" class="prompt">status: always building_</text>
</svg>
